<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>drasty.net - اتصل بنا</title>
    <!-- الأيقونات والخطوط المعتمدة عبر سيرفرات cdnjs لضمان عملها داخل سوريا للأبد دون حجب -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root {
            --bg-dark: #050a12;
            --bg-card: rgba(8, 16, 32, 0.7);
            --neon-gold: #d4af37;
            --neon-green: #00ff66;
            --text-light: #f5f6f8;
            --glass-border: rgba(212, 175, 55, 0.15);
        }

        /* حماية الشاشات اللمسية للهواتف وضمان ثبات أحجام الخطوط */
        * { 
            box-sizing: border-box; 
            margin: 0; padding: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: radial-gradient(circle at top, #0f233c 0%, var(--bg-dark) 100%);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 15px;
            overflow-x: hidden;
        }

        /* الواجهة الزجاجية المجسمة 3D Glassmorphism UI المتجاوبة 100% مع أبعاد الجوال */
        .contact-card {
            width: 100%;
            max-width: 430px;
            background: var(--bg-card);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5), inset 0 0 15px rgba(212, 175, 55, 0.03);
            padding: 35px 22px;
            text-align: center;
        }

        .logo-section i {
            font-size: 46px;
            color: var(--neon-gold);
            text-shadow: 0 0 15px var(--neon-gold);
            margin-bottom: 12px;
            display: inline-block;
        }

        h1 { font-size: 20px; color: #fff; margin-bottom: 6px; text-shadow: 0 0 8px rgba(255,255,255,0.1); }
        .contact-desc { color: #a0aec0; font-size: 12px; margin-bottom: 25px; }
        /* هندسة المدخلات والأزرار المخصصة للمس بالأصابع */
        form { text-align: right; }
        label { display: block; margin-bottom: 6px; font-size: 12px; color: #a0aec0; }
        
        .input-group { position: relative; margin-bottom: 15px; }
        .input-group i { position: absolute; right: 14px; top: 14px; color: var(--neon-gold); font-size: 14px; }
        
        input, textarea {
            width: 100%; padding: 12px 42px 12px 12px; background: rgba(3, 6, 12, 0.9);
            border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 10px;
            color: #fff; outline: none; transition: 0.3s; font-size: 14px;
        }
        input:focus, textarea:focus { border-color: var(--neon-gold); box-shadow: 0 0 12px rgba(212, 175, 55, 0.25); }
        textarea { height: 110px; resize: none; }

        .btn-portal {
            background: linear-gradient(135deg, #b38f2d, var(--neon-gold));
            color: #000; border: none; padding: 13px; border-radius: 10px;
            cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s;
            font-size: 14px; display: flex; justify-content: center; align-items: center; gap: 8px;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.1);
        }
        .btn-portal:hover { transform: translateY(-1px); box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4); }
        
        .system-alert {
            margin-top: 15px; padding: 10px; border-radius: 8px; font-size: 13px;
            display: none; text-align: center; font-weight: bold;
            background: rgba(0,255,102,0.1); border: 1px solid var(--neon-green); color: var(--neon-green); text-shadow: 0 0 5px var(--neon-green);
        }
    </style>
</head>
<body>

    <div class="contact-card">
        <div class="logo-section">
            <i class="fa-solid fa-paper-plane"></i>
            <h1>بوابة الاتصال المباشر والإرسال السحابي</h1>
            <div class="contact-desc">استفسار أو مشكلة في قفل الرسوم؟ تواصل معنا فوراً</div>
        </div>

        <form id="academyContactForm">
            <label>الاسم الكامل:</label>
            <div class="input-group">
                <i class="fa-solid fa-user"></i>
                <input type="text" id="contactName" placeholder="مثال: محمد أحمد" required>
            </div>

            <label>رقم الواتساب المتوفر لديك:</label>
            <div class="input-group">
                <i class="fa-solid fa-phone"></i>
                <input type="tel" id="contactPhone" placeholder="مثال: 0933XXXXXX" required>
            </div>

            <label>البريد الإلكتروني المعتمد:</label>
            <div class="input-group">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="contactEmail" placeholder="name@drasty.net" required>
            </div>

            <label>نص الرسالة أو تفاصيل الاستفسار العلمي المعهدي:</label>
            <div class="input-group">
                <i class="fa-solid fa-comment-dots" style="top: 14px;"></i>
                <textarea id="contactMessage" placeholder="اكتب مشكلتك التقنية بالتفصيل باللغة العربية الفصيحة..." required></textarea>
            </div>

            <button type="submit" class="btn-portal">
                <i class="fa-solid fa-share-from-square"></i> إرسال البيانات السحابية فوراً
            </button>
            
            <div id="contactAlert" class="system-alert">تم إرسال رسالتك بنجاح حياً لـ D1! راجع لوحة الأدمن لرؤيتها.</div>
        </form>
    </div>
    <script>
        // النطاق السحابي الفعلي لكلاود فلير وركر الخاص بالأكاديمية
        const WORKER_URL = "https://workers.dev"; 

        document.getElementById('academyContactForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const alertBox = document.getElementById('contactAlert');
            const submitBtn = e.target.querySelector('.btn-portal');
            
            alertBox.style.display = "none";
            submitBtn.disabled = true;
            submitBtn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> جاري الحقن والمزامنة الحية...`;

            const payload = {
                sender_name: document.getElementById('contactName').value,
                sender_phone: document.getElementById('contactPhone').value,
                sender_email: document.getElementById('contactEmail').value,
                message_text: document.getElementById('contactMessage').value
            };

            try {
                // إرسال البيانات فوراً لمسار استقبال رسائل الدعم الفني في السيرفر الخلفي
                const response = await fetch(`${WORKER_URL}/api/send-contact-message`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    alertBox.style.display = "block";
                    document.getElementById('academyContactForm').reset();
                } else {
                    alert("فشلت العملية: " + result.message);
                }
            } catch (err) {
                alert("خطأ في الاتصال بالخادم، يرجى التحقق من الشبكة وإعادة المحاولة.");
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = `<i class="fa-solid fa-share-from-square"></i> إرسال البيانات السحابية فوراً`;
            }
        });
    </script>
</body>
</html>
