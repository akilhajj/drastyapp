<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>drasty.net - بوابة الدخول الموحدة</title>
    <!-- استدعاء الأيقونات والخطوط عبر سيرفرات cdnjs لضمان عملها داخل سوريا للأبد دون حجب -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root {
            --bg-dark: #050a12;
            --bg-card: rgba(8, 16, 32, 0.7);
            --neon-gold: #d4af37;
            --neon-green: #00ff66;
            --neon-blue: #00d2ff;
            --neon-red: #ff3333;
            --text-light: #f5f6f8;
            --glass-border: rgba(212, 175, 55, 0.15);
        }

        /* ضبط شامل لمنع التشوهات الإملائية واللمسية في شاشات الهواتف المحمولة */
        * { 
            box-sizing: border-box; 
            margin: 0; padding: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: radial-gradient(circle at top, #0f233c 0%, var(--bg-dark) 100%);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px;
            overflow-x: hidden;
        }

        /* الحاوية الزجاجية المجسمة 3D Glassmorphism تتوافق 100% مع أبعاد شاشات الجوال */
        .login-card {
            width: 100%;
            max-width: 420px;
            background: var(--bg-card);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5), inset 0 0 15px rgba(212, 175, 55, 0.03);
            padding: 35px 22px;
            text-align: center;
            transition: border-color 0.3s ease;
        }

        .brand-section i {
            font-size: 50px;
            color: var(--neon-gold);
            text-shadow: 0 0 15px var(--neon-gold);
            margin-bottom: 15px;
            display: inline-block;
        }

        h1 { font-size: 20px; color: #fff; margin-bottom: 5px; text-shadow: 0 0 8px rgba(255,255,255,0.1); }
        .brand-desc { color: #a0aec0; font-size: 12px; margin-bottom: 28px; }
        /* هندسة وتنسيق الحقول والنماذج المخصصة للمس بالأصابع على الهواتف */
        form { text-align: right; }
        label { display: block; margin-bottom: 6px; font-size: 12px; color: #a0aec0; }
        
        .input-group { position: relative; margin-bottom: 18px; }
        .input-group i { position: absolute; right: 14px; top: 14px; color: var(--neon-gold); font-size: 14px; }
        
        input {
            width: 100%; padding: 12px 42px 12px 12px; background: rgba(3, 6, 12, 0.9);
            border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 10px;
            color: #fff; outline: none; transition: 0.3s; font-size: 14px;
        }
        input:focus { border-color: var(--neon-gold); box-shadow: 0 0 12px rgba(212, 175, 55, 0.25); }

        /* الأزرار الذهبية اللامعة بنظام النيون */
        .btn-portal {
            background: linear-gradient(135deg, #b38f2d, var(--neon-gold));
            color: #000; border: none; padding: 13px; border-radius: 10px;
            cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s;
            font-size: 14px; display: flex; justify-content: center; align-items: center; gap: 8px;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.1);
        }
        .btn-portal:hover { transform: translateY(-1px); box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4); }

        /* شاشات ورادارات التنبيه السريع والمقاوم للأخطاء */
        .system-alert {
            margin-top: 15px; padding: 10px; border-radius: 8px; font-size: 13px;
            display: none; text-align: center; font-weight: bold;
        }
        .alert-error { background: rgba(255,51,51,0.1); border: 1px solid var(--neon-red); color: var(--neon-red); text-shadow: 0 0 5px var(--neon-red); }
        .alert-success { background: rgba(0,255,102,0.1); border: 1px solid var(--neon-green); color: var(--neon-green); text-shadow: 0 0 5px var(--neon-green); }

        .footer-links { margin-top: 22px; font-size: 12px; color: #a0aec0; text-align: center; }
        .footer-links a { color: var(--neon-gold); text-decoration: none; font-weight: bold; margin: 0 4px; }
        .footer-links a:hover { text-shadow: 0 0 5px var(--neon-gold); }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="brand-section">
            <i class="fa-solid fa-graduation-cap"></i>
            <h1>أكاديمية drasty.net التعليمية</h1>
            <div class="brand-desc">بوابة البكالوريا السورية السحابية المتقدمة لعام 2026</div>
        </div>

        <!-- نموذج تسجيل الدخول المركزي والآمن من تداخل البيانات واللوحات -->
        <form id="portalLoginForm">
            <label>البريد الإلكتروني المعتمد:</label>
            <div class="input-group">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="userEmail" placeholder="name@drasty.net" required>
            </div>

            <label>كلمة المرور الحصينة:</label>
            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="userPassword" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-portal">
                <i class="fa-solid fa-right-to-bracket"></i> الدخول إلى الأكاديمية
            </button>
            
            <div id="portalAlert" class="system-alert"></div>
        </form>

        <div class="footer-links">
            ليس لديك حساب طالب؟ <a href="register.html">سجل الآن حياً</a> أو <a href="contact.html">اتصل بنا</a>
        </div>
    </div>
    <script>
        // النطاق الفعلي لـ Cloudflare Worker الخاص بالأكاديمية
        const WORKER_URL = "https://workers.dev"; 

        document.getElementById('portalLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const alertBox = document.getElementById('portalAlert');
            const submitBtn = e.target.querySelector('.btn-portal');
            
            // تصفير وتهيئة شاشة التنبيهات مع كل محاولة دخول
            alertBox.style.display = "none";
            alertBox.className = "system-alert";
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> جاري الفرز المركزي...`;

            const payload = {
                email: document.getElementById('userEmail').value,
                password: document.getElementById('userPassword').value
            };

            try {
                // الاتصال المركزي الآمن بمسار الدخول الموحد في السيرفر الخلفي
                const response = await fetch(`${WORKER_URL}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alertBox.style.display = "block";
                    alertBox.classList.add('alert-success');
                    alertBox.innerText = data.message + " جاري توجيهك الآمن للوحتك الإمبراطورية...";
                    
                    // التحويل الفوري للرابط الصحيح المرسل حياً من الـ D1 لمنع التداخل
                    setTimeout(() => {
                        window.location.href = data.redirectUrl;
                    }, 1000);
                } else {
                    throw new Error(data.message);
                }
            } catch (err) {
                alertBox.style.display = "block";
                alertBox.classList.add('alert-error');
                alertBox.innerText = err.message || "خطأ في المزامنة؛ يرجى مراجعة الاتصال بالشبكة.";
                
                submitBtn.disabled = false;
                submitBtn.innerHTML = `<i class="fa-solid fa-right-to-bracket"></i> الدخول إلى الأكاديمية`;
            }
        });
    </script>
</body>
</html>
